<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM 그룹별/개인별 데일리 성과</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: #f0f2f5; color: #333; }

  /* Header */
  .header { background: #0F243E; color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-left img { height: 32px; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-right .last-update { font-size: 12px; opacity: 0.8; }
  .btn-upload-open { padding: 8px 16px; border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; background: rgba(255,255,255,0.15); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-upload-open:hover { background: rgba(255,255,255,0.3); }

  /* Modal overlay */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 32px; max-width: 720px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .modal h2 { font-size: 18px; margin-bottom: 20px; color: #333; }
  .modal-close { float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: #999; line-height: 1; }
  .modal-close:hover { color: #333; }

  /* Upload boxes inside modal */
  .upload-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .upload-box { flex: 1; min-width: 180px; background: #f8f9fa; border: 2px dashed #ccc; border-radius: 12px; padding: 20px 14px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .upload-box:hover { border-color: #1a73e8; background: #f0f4ff; }
  .upload-box.loaded { border-color: #34a853; border-style: solid; background: #f0faf3; }
  .upload-box input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-box .icon { font-size: 28px; margin-bottom: 4px; }
  .upload-box .label { font-size: 13px; font-weight: 600; color: #555; }
  .upload-box .sub { font-size: 11px; color: #999; margin-top: 4px; }
  .upload-box .status { font-size: 11px; color: #34a853; font-weight: 600; margin-top: 6px; display: none; }
  .upload-box.loaded .status { display: block; }
  .upload-box .progress-bar { width: 100%; height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
  .upload-box .progress-bar.active { display: block; }
  .upload-box .progress-fill { height: 100%; background: #1a73e8; border-radius: 2px; transition: width 0.3s ease; width: 0%; }
  .upload-box .progress-fill.done { background: #34a853; }
  .upload-box .btn-clear { position: absolute; top: 6px; right: 6px; background: none; border: none; color: #ccc; font-size: 14px; cursor: pointer; padding: 2px 5px; border-radius: 4px; z-index: 2; display: none; }
  .upload-box.loaded .btn-clear { display: block; }
  .upload-box .btn-clear:hover { color: #ea4335; background: #fde7e9; }

  /* File list inside upload box */
  .file-list { margin-top: 8px; text-align: left; max-height: 120px; overflow-y: auto; }
  .file-item { display: flex; align-items: center; gap: 6px; font-size: 11px; padding: 2px 0; color: #333; }
  .file-item .file-icon { color: #34a853; font-size: 13px; }
  .file-item .file-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .file-count { color: #1a73e8; font-weight: 600; white-space: nowrap; }

  /* Storage panel inside modal */
  .storage-row { padding: 12px 0; font-size: 13px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border-top: 1px solid #eee; margin-top: 8px; }
  .storage-row .storage-label { font-weight: 600; color: #555; }
  .storage-row .storage-dates { color: #1a73e8; }
  .storage-row button { padding: 4px 12px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; }
  .storage-row button:hover { background: #f5f5f5; }
  .storage-row button.danger { color: #ea4335; border-color: #ea4335; }
  .storage-row button.danger:hover { background: #fde7e9; }

  /* Status bar inside modal */
  .modal .msg { padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-top: 8px; }
  .msg-success { background: #e6f4ea; color: #1e7e34; }
  .msg-warn { background: #fff8e1; color: #e65100; }
  .msg-error { background: #fde7e9; color: #c62828; }

  /* Main content */
  .main-content { padding: 24px 32px 32px; }
  .info-bar { background: #fff; border-radius: 10px; padding: 14px 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); font-size: 13px; color: #555; display: flex; gap: 24px; flex-wrap: wrap; }
  .info-bar strong { color: #333; }

  /* Tabs */
  .tab-bar { display: flex; align-items: center; gap: 0; margin-bottom: 16px; }
  .tab-btn { padding: 10px 24px; border: 1px solid #ddd; border-bottom: none; border-radius: 8px 8px 0 0; background: #f5f5f5; color: #666; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .tab-btn:hover { background: #e8eaf6; }
  .tab-btn.active { background: #fff; color: #1a73e8; border-color: #ccc; border-bottom: 2px solid #fff; margin-bottom: -1px; z-index: 1; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Performance table styles */
  .group-section { margin-bottom: 24px; }
  .group-header { font-size: 14px; font-weight: 700; padding: 8px 14px; border-radius: 8px 8px 0 0; color: #fff; display: flex; justify-content: space-between; align-items: center; }
  .group-header .group-count { font-size: 13px; font-weight: 400; opacity: 0.85; }
  .group-header.w-group { background: #1565c0; }
  .group-header.e-group { background: #1e88e5; }
  .group-header.n-group { background: #42a5f5; }
  .group-header.lang-group { background: #81c784; color: #fff; }
  .group-header.talkis-group { background: #b39ddb; color: #fff; }

  .perf-table-wrap { overflow-x: auto; background: #fff; border-radius: 0 0 10px 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; border-top: none; }
  .perf-table { font-size: 11px; min-width: 1500px; width: 100%; border-collapse: collapse; }
  .perf-table th { padding: 4px 6px; text-align: center; font-size: 10px; font-weight: 600; color: #555; border-bottom: 1px solid #ddd; border-right: 1px solid #eee; white-space: nowrap; cursor: default; }
  .perf-table th:last-child { border-right: none; }
  .perf-table td { padding: 3px 6px; text-align: center; font-size: 11px; border-bottom: 1px solid #eee; border-right: 1px solid #f5f5f5; }
  .perf-table td:last-child { border-right: none; }
  .perf-table tbody tr:hover td { background: #f0f4ff; }
  .perf-table tbody tr:nth-child(even) td { background: #fafbfc; }
  .perf-table tbody tr:nth-child(even):hover td { background: #f0f4ff; }
  .perf-table td.name-cell { text-align: left; font-weight: 600; white-space: nowrap; }
  .perf-table td.left { text-align: left; }
  .perf-table .section-header th { font-size: 11px; font-weight: 700; border-bottom: 2px solid #ccc; padding: 5px 6px; }
  .perf-table .sub-header th { background: #f5f7fa; border-bottom: 2px solid #ddd; }
  .perf-table tr.total-row td { background: #eef1f5; font-weight: 700; border-top: 2px solid #aaa; }
  .perf-table .rate-cell { font-weight: 600; }
  .perf-table .highlight { color: #1a73e8; font-weight: 700; }
  .perf-table .rank-change { font-size: 11px; font-weight: 700; white-space: nowrap; }
  .perf-table .rank-up { color: #1a73e8; }
  .perf-table .rank-down { color: #c62828; }
  .perf-table .rank-same { color: #bbb; }

  .empty-state { text-align: center; color: #888; padding: 80px 20px; background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .empty-state p { margin-top: 8px; font-size: 14px; }

  .hidden { display: none !important; }

  /* Filter bar */
  .filter-bar { background: #fff; border-radius: 12px; padding: 14px 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .filter-row label.filter-label { font-size: 13px; font-weight: 600; color: #555; white-space: nowrap; }
  .filter-row input[type="date"] { padding: 4px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
  .filter-row .sep { font-size: 12px; color: #999; }
  .quick-btns { display: flex; gap: 3px; flex-wrap: wrap; }
  .quick-btn { padding: 5px 12px; border: 1px solid #ccc; border-radius: 5px; background: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .quick-btn:hover { background: #f0f4ff; border-color: #1a73e8; }
  .quick-btn.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }
  .filter-divider { width: 1px; height: 20px; background: #ddd; margin: 0 4px; }

  /* Global filters */
  .filter-dropdown { position: relative; display: flex; align-items: center; gap: 4px; }
  .filter-dropdown .filter-label { font-size: 13px; font-weight: 600; color: #555; white-space: nowrap; }
  .filter-dropdown-btn { padding: 5px 12px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 4px; }
  .filter-dropdown-btn:hover { border-color: #1a73e8; }
  .filter-dropdown-btn .count-badge { background: #1a73e8; color: #fff; border-radius: 10px; padding: 2px 8px; font-size: 13px; }
  .filter-panel { display: none; position: absolute; top: 100%; left: 0; z-index: 100; background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); min-width: 180px; max-height: 260px; overflow-y: auto; padding: 6px 0; margin-top: 4px; }
  .filter-panel.open { display: block; }
  .filter-panel label { display: flex; align-items: center; gap: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .filter-panel label:hover { background: #f5f7fa; }
  .filter-panel .select-all { border-bottom: 1px solid #eee; padding-bottom: 6px; margin-bottom: 4px; font-weight: 600; }
  .filter-search { padding: 4px 10px; margin: 4px 8px 6px; }
  .filter-search input { width: 100%; padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; outline: none; }
  .filter-search input:focus { border-color: #1a73e8; }

  /* KPI cards */
  .kpi-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .kpi-card { flex: 1; min-width: 130px; max-width: 200px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; text-align: center; }
  .kpi-card .kpi-label { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .kpi-card .kpi-value { font-size: 22px; font-weight: 800; }
  .kpi-card.kpi-db .kpi-label { color: #2e7d32; }
  .kpi-card.kpi-db .kpi-value { color: #2e7d32; }
  .kpi-card.kpi-daily .kpi-label { color: #e65100; }
  .kpi-card.kpi-daily .kpi-value { color: #e65100; }
  .kpi-card.kpi-actual .kpi-label { color: #ef5350; }
  .kpi-card.kpi-actual .kpi-value { color: #ef5350; }
  .kpi-card.kpi-rate .kpi-label { color: #c62828; }
  .kpi-card.kpi-rate .kpi-value { color: #c62828; }

  /* Debug detail modal */
  .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; justify-content: center; align-items: center; }
  .detail-overlay.active { display: flex; }
  .detail-modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .detail-modal h3 { margin-bottom: 12px; font-size: 15px; }
  .detail-modal table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .detail-modal th, .detail-modal td { padding: 5px 8px; border: 1px solid #eee; text-align: center; }
  .detail-modal th { background: #f5f7fa; font-weight: 600; }
  .detail-modal .cancelled { color: #c62828; text-decoration: line-through; }
  .detail-modal .close-btn { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }
  .detail-modal .close-btn:hover { color: #333; }

  /* Download buttons */
  .tab-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .btn-download { padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; font-weight: 600; color: #555; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
  .btn-download:hover { border-color: #1a73e8; color: #1a73e8; background: #f0f4ff; }

  @media (max-width: 768px) {
    .header { flex-direction: column; gap: 12px; align-items: flex-start; }
    .main-content { padding: 16px; }
    .upload-grid { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <img src="logo.png" alt="WM">
    <h1>WM 그룹별/개인별 데일리 성과</h1>
  </div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate"></span>
    <button class="btn-upload-open" onclick="openModal()">데이터 업로드</button>
  </div>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2>데이터 업로드</h2>
    <div class="upload-grid">
      <div class="upload-box" id="uploadRoster">
        <button class="btn-clear" onclick="clearRoster(event)" title="명단 초기화">✕</button>
        <div class="icon">👥</div>
        <div class="label">명단 파일</div>
        <div class="sub">WM_근태보고_그룹_yymm.xls</div>
        <div class="status" id="rosterStatus"></div>
        <div class="file-list" id="rosterFileList"></div>
        <div class="progress-bar" id="progressRoster"><div class="progress-fill"></div></div>
        <input type="file" accept=".xlsx,.xls" id="fileRoster">
      </div>
      <div class="upload-box" id="uploadDb">
        <button class="btn-clear" onclick="clearDb(event)" title="DB수 초기화">✕</button>
        <div class="icon">📂</div>
        <div class="label">DB수 파일 (일일)</div>
        <div class="sub">WM_고객관리_yyyy-mm-dd.xlsx</div>
        <div class="status" id="dbStatus"></div>
        <div class="file-list" id="dbFileList"></div>
        <div class="progress-bar" id="progressDb"><div class="progress-fill"></div></div>
        <input type="file" accept=".xlsx,.xls" id="fileDb" multiple>
      </div>
      <div class="upload-box" id="uploadContract">
        <button class="btn-clear" onclick="clearContract(event)" title="계약수 초기화">✕</button>
        <div class="icon">📂</div>
        <div class="label">계약수 파일 (월 누적)</div>
        <div class="sub">신청자관리_yyyy_mm_dd.xls</div>
        <div class="status" id="contractStatus"></div>
        <div class="file-list" id="contractFileList"></div>
        <div class="progress-bar" id="progressContract"><div class="progress-fill"></div></div>
        <input type="file" accept=".xlsx,.xls" id="fileContract">
      </div>
    </div>
    <div class="storage-row">
      <span class="storage-label">저장 현황:</span>
      <span class="storage-dates" id="storageDates">없음</span>
      <button onclick="refreshStorageDisplay()">새로고침</button>
      <button class="danger" onclick="clearStorage()">전체 초기화</button>
    </div>
    <div id="statusBar"></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="detail-modal">
    <button class="close-btn" onclick="document.getElementById('detailOverlay').classList.remove('active')">&times;</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- Main Content -->
<div class="main-content" id="mainContent">
  <div id="filterSection" class="hidden">
    <div class="filter-bar">
      <div class="filter-row">
        <label class="filter-label">기간 :</label>
        <input type="date" id="dateStart">
        <span class="sep">~</span>
        <input type="date" id="dateEnd">
        <div class="quick-btns">
          <button class="quick-btn" onclick="setQuickDate('today', this)">오늘</button>
          <button class="quick-btn" onclick="setQuickDate('yesterday', this)">전일</button>
          <button class="quick-btn active" onclick="setQuickDate('thisMonth', this)">이번달</button>
          <button class="quick-btn" onclick="setQuickDate('1m', this)">1개월</button>
          <button class="quick-btn" onclick="setQuickDate('3m', this)">3개월</button>
          <button class="quick-btn" onclick="setQuickDate('6m', this)">6개월</button>
          <button class="quick-btn" onclick="setQuickDate('12m', this)">12개월</button>
          <button class="quick-btn" onclick="setQuickDate('all', this)">전체</button>
        </div>
        <div class="filter-divider"></div>
        <div class="filter-dropdown" data-filter="group">
          <span class="filter-label">그룹 :</span>
          <button class="filter-dropdown-btn" onclick="toggleFilterPanel(this)"><span class="count-badge">전체</span> ▾</button>
          <div class="filter-panel" id="filterPanelGroup"></div>
        </div>
        <div class="filter-dropdown" data-filter="center">
          <span class="filter-label">센터 :</span>
          <button class="filter-dropdown-btn" onclick="toggleFilterPanel(this)"><span class="count-badge">전체</span> ▾</button>
          <div class="filter-panel" id="filterPanelCenter"></div>
        </div>
        <div class="filter-dropdown" data-filter="team">
          <span class="filter-label">팀 :</span>
          <button class="filter-dropdown-btn" onclick="toggleFilterPanel(this)"><span class="count-badge">전체</span> ▾</button>
          <div class="filter-panel" id="filterPanelTeam"></div>
        </div>
        <div class="filter-dropdown" data-filter="person">
          <span class="filter-label">개인 :</span>
          <button class="filter-dropdown-btn" onclick="toggleFilterPanel(this)"><span class="count-badge">전체</span> ▾</button>
          <div class="filter-panel" id="filterPanelPerson"></div>
        </div>
      </div>
      <div class="kpi-row">
        <div class="kpi-card kpi-db"><div class="kpi-label">📋 DB수</div><div class="kpi-value" id="kpiDbCount">0</div></div>
        <div class="kpi-card kpi-daily"><div class="kpi-label">⚡ 일계약수</div><div class="kpi-value" id="kpiDailyContract">0</div></div>
        <div class="kpi-card kpi-actual"><div class="kpi-label">✅ 실계약수</div><div class="kpi-value" id="kpiActualContract">0</div></div>
        <div class="kpi-card kpi-rate"><div class="kpi-label">📈 실계약률</div><div class="kpi-value" id="kpiContractRate">-</div></div>
      </div>
    </div>
  </div>
  <div class="empty-state" id="emptyState">
    <div style="font-size:48px; margin-bottom:12px;">📊</div>
    <p>우측 상단 <strong>데이터 업로드</strong> 버튼을 눌러<br>명단, DB수, 계약수 파일을 업로드해주세요.</p>
  </div>
  <div id="dashboardArea" class="hidden">
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" onclick="switchTab('main', this)">뇌새김</button>
      <button class="tab-btn" onclick="switchTab('talkis', this)">톡이즈</button>
      <div class="tab-actions">
        <button class="btn-download" onclick="downloadPng()">🖼️ PNG 다운로드</button>
        <button class="btn-download" onclick="downloadExcel()">📊 Excel 다운로드</button>
        <button class="btn-download" onclick="downloadHtml()">🌐 HTML 다운로드</button>
      </div>
    </div>
    <div class="tab-panel active" id="tabMain"></div>
    <div class="tab-panel" id="tabTalkis"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// ── State ──
// ══════════════════════════════════════════════
let contractData = null;
let rosterMap = null;         // current active roster (latest month)
let rosterByMonth = {};       // { 'YYYY-MM': Map(name → info) }
let todayDbDate = null;
let lastBuildDebug = {};  // { personName: { holDetails: [...] } }

// 명단 제외 대상
const ROSTER_EXCLUDE = new Set(['(R_송내)유현미', '(R_송내)허선정', '(R_송내)이영혜', '(R_송내)이미현']);

// ── Column indices for RAW CMS files (0-based) ──
const DB_COL = {
  customerKey: 6, obName: 7, distributeDate: 8, inflowDate: 9,
  dbInfo: 15, mediaCode: 19, package: 20, orderDate: 23,
  mainGift: 27, customerStatus: 29
};
const CT_COL = {
  customerKey: 3, manager: 13, dbDate: 14, applicationDate: 15,

const KOREAN_HOLIDAYS = new Set([
  '2025-01-01','2025-01-28','2025-01-29','2025-01-30',
  '2025-03-01','2025-03-03',
  '2025-05-05','2025-05-06','2025-06-06',
  '2025-08-15',
  '2025-10-03','2025-10-05','2025-10-06','2025-10-07','2025-10-08','2025-10-09',
  '2025-12-25',
  '2026-01-01',
  '2026-02-15','2026-02-16','2026-02-17','2026-02-18',
  '2026-03-01','2026-03-02',
  '2026-05-05','2026-05-24','2026-05-25','2026-06-06',
  '2026-08-15','2026-08-17',
  '2026-09-24','2026-09-25','2026-09-26',
  '2026-10-03','2026-10-05','2026-10-09',
  '2026-12-25'
]);

function isHoliday(dateStr) {
  if (!dateStr) return false;
  if (KOREAN_HOLIDAYS.has(dateStr)) return true;
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  return day === 0 || day === 6;
}

// ══════════════════════════════════════════════
// ── Helpers ──
// ══════════════════════════════════════════════
function parseDate(val) {
  if (!val) return null;
  if (val instanceof Date) return isNaN(val.getTime()) ? null : val;
  const s = String(val).trim();
  if (!s) return null;
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}
function fmtDate(d) {
  if (!d) return '';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function datePart(val) {
  const d = parseDate(val);
  return d ? fmtDate(d) : '';
}
function fmtRate(n, d) {
  if (!d || d === 0) return '-';
  return (n / d * 100).toFixed(1) + '%';
}
function fmtDateShort(val) {
  const d = parseDate(val);
  return d ? fmtDate(d) : '';
}
function fmtDateTime(date) {
  const y = date.getFullYear();
  const mo = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  const h = String(date.getHours()).padStart(2,'0');
  const mi = String(date.getMinutes()).padStart(2,'0');
  return `${y}-${mo}-${d} ${h}:${mi}`;
}

// 파일명에서 월 키 추출: "WM_근태보고_그룹_2603.xls" → "2026-03"
function extractMonthKey(filename) {
  const m = filename.match(/(\d{4})[\-_.]?(\d{2})/);
  if (m) {
    const num = m[1] + m[2];
    // 6자리 yyyymm vs 4자리 yymm
    if (num.length >= 6) return `${num.slice(0,4)}-${num.slice(4,6)}`;
    // 4자리: yymm → 20yy-mm
    return `20${num.slice(0,2)}-${num.slice(2,4)}`;
  }
  // fallback: 현재 월
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}

function setProgress(barId, pct, done) {
  const bar = document.getElementById(barId);
  const fill = bar.querySelector('.progress-fill');
  bar.classList.add('active');
  fill.style.width = pct + '%';
  if (done) fill.classList.add('done');
  else fill.classList.remove('done');
}
function resetProgress(barId) {
  const bar = document.getElementById(barId);
  bar.classList.remove('active');
  bar.querySelector('.progress-fill').style.width = '0%';
  bar.querySelector('.progress-fill').classList.remove('done');
}

function readExcel(file, callback, progressBarId) {
  const reader = new FileReader();
  if (progressBarId) {
    setProgress(progressBarId, 0, false);
    reader.onprogress = e => {
      if (e.lengthComputable) setProgress(progressBarId, Math.round(e.loaded / e.total * 60), false);
    };
  }
  reader.onload = e => {
    try {
      if (progressBarId) setProgress(progressBarId, 70, false);
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      if (progressBarId) setProgress(progressBarId, 85, false);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (progressBarId) setProgress(progressBarId, 95, false);
      callback(raw.slice(1));
      if (progressBarId) setProgress(progressBarId, 100, true);
    } catch (err) {
      showStatus(`파일 읽기 오류: ${err.message}`, 'error');
      if (progressBarId) resetProgress(progressBarId);
    }
  };
  reader.readAsArrayBuffer(file);
}

const DB_NAME = 'dbPerfDashboard';
const DB_VERSION = 4;
const STORE_DATES = 'dates';
const STORE_KEYS = 'keyMeta';
const STORE_ROSTER = 'roster';       // key: 'YYYY-MM', value: array of roster rows
const STORE_CONTRACT = 'contract';
const STORE_FILEMETA = 'fileMeta';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_DATES)) db.createObjectStore(STORE_DATES);
      if (!db.objectStoreNames.contains(STORE_KEYS)) db.createObjectStore(STORE_KEYS);
      if (!db.objectStoreNames.contains(STORE_ROSTER)) db.createObjectStore(STORE_ROSTER);
      if (!db.objectStoreNames.contains(STORE_CONTRACT)) db.createObjectStore(STORE_CONTRACT);
      if (!db.objectStoreNames.contains(STORE_FILEMETA)) db.createObjectStore(STORE_FILEMETA);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function loadAccumulated() {
  try {
    const db = await openDB();
    const tx = db.transaction([STORE_DATES, STORE_KEYS], 'readonly');

    const dates = await new Promise((resolve, reject) => {
      const store = tx.objectStore(STORE_DATES);
      const result = {};
      const req = store.openCursor();
      req.onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) { result[cursor.key] = cursor.value; cursor.continue(); }
        else resolve(result);
      };
      req.onerror = () => reject(req.error);
    });

    const keyMeta = await new Promise((resolve, reject) => {
      const store = tx.objectStore(STORE_KEYS);
      const result = {};
      const req = store.openCursor();
      req.onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) { result[cursor.key] = cursor.value; cursor.continue(); }
        else resolve(result);
      };
      req.onerror = () => reject(req.error);
    });

    db.close();
    return { dates, keyMeta };
  } catch {
    return { dates: {}, keyMeta: {} };
  }
}

async function accumulateDbData(rows) {
  const seen = new Set();
  const uniqueRows = rows.filter(row => {
    const key = String(row[DB_COL.customerKey] || '').trim();
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  let existingKeys;
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_KEYS, 'readonly');
    existingKeys = await new Promise((resolve, reject) => {
      const req = tx.objectStore(STORE_KEYS).getAllKeys();
      req.onsuccess = () => resolve(new Set(req.result));
      req.onerror = () => reject(req.error);
    });
    db.close();
  } catch { existingKeys = new Set(); }

  const newRows = uniqueRows.filter(row => {
    const key = String(row[DB_COL.customerKey] || '').trim();
    return !existingKeys.has(key);
  });

  const dupCount = rows.length - uniqueRows.length;
  const overlapCount = uniqueRows.length - newRows.length;
  if (dupCount > 0 || overlapCount > 0) {
    showStatus(`중복 제거: 파일 내 ${dupCount}건, 기존 누적 데이터와 ${overlapCount}건`, 'warn');
  }

  const dateMap = {};
  const keyEntries = [];

  newRows.forEach(row => {
    const name = String(row[DB_COL.obName] || '').trim();
    if (!name) return;
    // OB명에 "군자" 또는 "관리자" 포함 시 완전 제외
    if (name.includes('군자') || name.includes('관리자')) return;
    const distDate = datePart(row[DB_COL.distributeDate]);
    if (!distDate) return;
    const mediaCode = String(row[DB_COL.mediaCode] || '').trim();
    const isIN = mediaCode === '';
    const orderDateStr = datePart(row[DB_COL.orderDate]);
    const dbInfoVal = String(row[DB_COL.dbInfo] || '').trim();
    const isRecall = dbInfoVal.includes('재콜');
    const eligible = (distDate === orderDateStr) && !isRecall;
    const custKey = String(row[DB_COL.customerKey] || '').trim();

    // 재콜은 DB수 집계에서만 제외 (계약 매칭용 keyMeta에는 저장)
    if (!isRecall) {
      if (!dateMap[distDate]) dateMap[distDate] = {};
      if (!dateMap[distDate][name]) dateMap[distDate][name] = { total: 0, nonIN: 0, inOnly: 0 };
      dateMap[distDate][name].total++;
      if (isIN) dateMap[distDate][name].inOnly++;
      else dateMap[distDate][name].nonIN++;
    }

    if (custKey) {
      keyEntries.push([custKey, { d: distDate, in: isIN ? 1 : 0, el: eligible ? 1 : 0, p: name }]);
    }
  });

  const dates = Object.keys(dateMap).sort();
  if (dates.length === 0) {
    showStatus('DB수 파일에서 분배일을 읽을 수 없습니다.', 'error');
    return null;
  }

  try {
    const db = await openDB();
    const txRead = db.transaction(STORE_DATES, 'readonly');
    const existingDates = {};
    for (const date of dates) {
      const existing = await new Promise(resolve => {
        const req = txRead.objectStore(STORE_DATES).get(date);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => resolve(null);
      });
      if (existing) existingDates[date] = existing;
    }

    const tx = db.transaction([STORE_DATES, STORE_KEYS], 'readwrite');
    const dateStore = tx.objectStore(STORE_DATES);
    for (const date of dates) {
      const newPersons = dateMap[date];
      const prev = existingDates[date]?.persons || {};
      for (const [name, counts] of Object.entries(newPersons)) {
        if (prev[name]) {
          prev[name].total += counts.total;
          prev[name].nonIN += counts.nonIN;
          prev[name].inOnly += counts.inOnly;
        } else {
          prev[name] = { ...counts };
        }
      }
      dateStore.put({ isHoliday: isHoliday(date), persons: prev }, date);
    }
    const keyStore = tx.objectStore(STORE_KEYS);
    for (const [k, v] of keyEntries) keyStore.put(v, k);
    await new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = () => reject(tx.error); });
    db.close();
  } catch (err) {
    showStatus(`DB 저장 오류: ${err.message}`, 'error');
  }

  await refreshStorageDisplay();
  return dates[dates.length - 1];
}

async function refreshStorageDisplay() {
  try {
    const db = await openDB();
    const tx = db.transaction([STORE_DATES, STORE_ROSTER, STORE_CONTRACT], 'readonly');
    const keys = await new Promise((resolve, reject) => {
      const req = tx.objectStore(STORE_DATES).getAllKeys();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    const rosterKeys = await new Promise((resolve) => {
      const req = tx.objectStore(STORE_ROSTER).getAllKeys();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => resolve([]);
    });
    const hasContract = await new Promise((resolve) => {
      const req = tx.objectStore(STORE_CONTRACT).get('data');
      req.onsuccess = () => resolve(!!req.result);
      req.onerror = () => resolve(false);
    });
    db.close();
    const dates = keys.sort();
    const el = document.getElementById('storageDates');
    const parts = [];
    parts.push(rosterKeys.length > 0 ? `명단 ${rosterKeys.sort().join(', ')}` : '명단 X');
    if (dates.length > 0) {
      parts.push(`DB ${dates.length}일 (${dates[0]}~${dates[dates.length-1]})`);
    } else {
      parts.push('DB X');
    }
    parts.push(hasContract ? '계약 O' : '계약 X');
    el.textContent = parts.join(' | ');
  } catch {
    document.getElementById('storageDates').textContent = '(읽기 오류)';
  }
}

async function saveFileMeta(type, fileName, rowCount) {
  try {
    const db = await openDB();
    let files = [];
    if (type === 'db' || type === 'roster') {
      const txR = db.transaction(STORE_FILEMETA, 'readonly');
      const existing = await new Promise(resolve => {
        const req = txR.objectStore(STORE_FILEMETA).get(type);
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => resolve([]);
      });
      files = existing;
    }
    files.push({ name: fileName, count: rowCount, date: fmtDateTime(new Date()) });
    const tx = db.transaction(STORE_FILEMETA, 'readwrite');
    tx.objectStore(STORE_FILEMETA).put(files, type);
    await new Promise((resolve, reject) => { tx.oncomplete = resolve; tx.onerror = () => reject(tx.error); });
    db.close();
    renderFileList(type, files);
  } catch (err) {
    console.error('파일 메타 저장 오류:', err);
  }
}

function renderFileList(type, files) {
  const listId = { roster: 'rosterFileList', db: 'dbFileList', contract: 'contractFileList' }[type];
  const el = document.getElementById(listId);
  if (!el || !files || files.length === 0) { if (el) el.innerHTML = ''; return; }
  el.innerHTML = files.map(f =>
    `<div class="file-item"><span class="file-icon">✓</span><span class="file-name">${f.name}</span><span class="file-count">${Number(f.count).toLocaleString()}건</span></div>`
  ).join('');
}

async function loadSavedFiles() {
  try {
    const db = await openDB();
    const tx = db.transaction([STORE_ROSTER, STORE_CONTRACT, STORE_FILEMETA], 'readonly');

    // Load all roster months
    const rosterEntries = await new Promise((resolve, reject) => {
      const store = tx.objectStore(STORE_ROSTER);
      const result = [];
      const req = store.openCursor();
      req.onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) { result.push([cursor.key, cursor.value]); cursor.continue(); }
        else resolve(result);
      };
      req.onerror = () => reject(req.error);
    });

    const contractRows = await new Promise((resolve, reject) => {
      const req = tx.objectStore(STORE_CONTRACT).get('data');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });

    const fileMeta = {};
    for (const type of ['roster', 'db', 'contract']) {
      fileMeta[type] = await new Promise(resolve => {
        const req = tx.objectStore(STORE_FILEMETA).get(type);
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => resolve([]);
      });
    }

    db.close();

    for (const type of ['roster', 'db', 'contract']) {
      renderFileList(type, fileMeta[type]);
    }

    if (rosterEntries.length > 0) {
      rosterByMonth = {};
      for (const [monthKey, rows] of rosterEntries) {
        rosterByMonth[monthKey] = parseRosterRows(rows);
      }
      // Use latest month as active roster
      const latestMonth = Object.keys(rosterByMonth).sort().pop();
      rosterMap = rosterByMonth[latestMonth];
      document.getElementById('uploadRoster').classList.add('loaded');
      const totalNames = Object.values(rosterByMonth).reduce((s, m) => Math.max(s, m.size), 0);
      document.getElementById('rosterStatus').textContent = `${totalNames}명 (저장됨, ${Object.keys(rosterByMonth).length}개월)`;
    }
    if (contractRows) {
      contractData = contractRows;
      document.getElementById('uploadContract').classList.add('loaded');
      document.getElementById('contractStatus').textContent = `${contractData.length.toLocaleString()}건 (저장됨)`;
    }

    if (rosterMap && contractData) {
      await tryBuildTab4();
    }
  } catch (err) {
    console.error('저장 데이터 복원 오류:', err);
  }
}

function parseRosterRows(rows) {
  const map = new Map();
  rows.forEach(row => {
    const name = String(row[ROSTER_COL.name] || '').trim();
    if (!name) return;
    // R 포함 필터: 이름에 R이 없으면 제외
    if (!name.includes('R')) return;
    // 특정 인원 제외
    if (ROSTER_EXCLUDE.has(name)) return;

    const role = String(row[ROSTER_COL.role] || '').trim();
    const groupRaw = String(row[ROSTER_COL.group] || '').trim();
    const center = String(row[ROSTER_COL.center] || '').trim();
    const team = String(row[ROSTER_COL.team] || '').trim();
    const hireDate = fmtDateShort(row[ROSTER_COL.hireDate]);

    let group = '';
    if (role === '제2외국어' || role === '톡이즈') {
      group = role;
    } else if (role === '뇌새김영어') {
      if (groupRaw === 'A그룹') group = 'N그룹';
      else group = groupRaw;
    } else {
      group = groupRaw || role || '미분류';
    }

    map.set(name, { group, center, team, hireDate, role });
  });
  return map;
}

function parseRoster(rows) {
  rosterMap = parseRosterRows(rows);
}

function getFilterDates() {

  return { start: start || null, end: end || null };
}

function setQuickDate(type, btn) {
  const today = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  let start, end;

  switch (type) {
    case 'today':
      start = end = fmt(today);
      break;
    case 'yesterday': {
      const y = new Date(today); y.setDate(y.getDate() - 1);
      start = end = fmt(y);
      break;
    }
    case 'thisMonth':
      start = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`;
      end = fmt(today);
      break;
    case '1m': case '3m': case '6m': case '12m': {
      const months = parseInt(type);
      const s = new Date(today); s.setMonth(s.getMonth() - months);
      start = fmt(s); end = fmt(today);
      break;
    }
    case 'all':
      start = ''; end = '';
      break;
  }

  document.getElementById('dateStart').value = start;
  document.getElementById('dateEnd').value = end;

  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  tryBuildTab4();
}

function initDefaultDates() {
  const today = new Date();

  document.getElementById('dateStart').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`;
  document.getElementById('dateEnd').value = fmt(today);
}

function toggleFilterPanel(btn) {
  const panel = btn.closest('.filter-dropdown').querySelector('.filter-panel');
  document.querySelectorAll('.filter-panel.open').forEach(p => {
    if (p !== panel) p.classList.remove('open');
  });

}

document.addEventListener('click', e => {

    document.querySelectorAll('.filter-panel.open').forEach(p => p.classList.remove('open'));
  }
});

function populateFilters() {
  if (!rosterMap) return;

  const groups = new Set(), centers = new Set(), teams = new Set(), persons = new Set();
  // Collect from ALL months' rosters
  for (const monthRoster of Object.values(rosterByMonth)) {
    monthRoster.forEach((info, name) => {
      if (info.group) groups.add(info.group);
      if (info.center) centers.add(info.center);
      if (info.team) teams.add(info.team);
      persons.add(name);
    });
  }
  // Fallback: current rosterMap
  if (groups.size === 0) {
    rosterMap.forEach((info, name) => {
      if (info.group) groups.add(info.group);
      if (info.center) centers.add(info.center);
      if (info.team) teams.add(info.team);
      persons.add(name);
    });
  }

  const buildPanel = (panelId, items) => {
    const panel = document.getElementById(panelId);
    const sorted = [...items].sort();
    let html = `<label class="select-all"><input type="checkbox" checked onchange="toggleSelectAll(this, '${panelId}')"> 전체선택</label>`;
    sorted.forEach(item => {
      html += `<label><input type="checkbox" checked value="${item}" onchange="onFilterChange('${panelId}')"> ${item}</label>`;
    });
    panel.innerHTML = html;
  };

  buildPanel('filterPanelGroup', groups);
  buildPanel('filterPanelCenter', centers);
  buildPanel('filterPanelTeam', teams);
  // 개인 필터: 검색 기능 포함
  const personPanel = document.getElementById('filterPanelPerson');
  const sortedPersons = [...persons].sort();
  let pHtml = `<div class="filter-search"><input type="text" placeholder="이름 검색..." oninput="filterPersonSearch(this.value)"></div>`;
  pHtml += `<label class="select-all"><input type="checkbox" checked onchange="toggleSelectAll(this, 'filterPanelPerson')"> 전체선택</label>`;
  sortedPersons.forEach(item => {
    pHtml += `<label data-name="${item}"><input type="checkbox" checked value="${item}" onchange="onFilterChange('filterPanelPerson')"> ${item}</label>`;
  });
  personPanel.innerHTML = pHtml;
}

function filterPersonSearch(query) {
  const panel = document.getElementById('filterPanelPerson');
  const labels = panel.querySelectorAll('label[data-name]');
  const q = query.trim().toLowerCase();
  labels.forEach(label => {
    const name = label.getAttribute('data-name').toLowerCase();
    label.style.display = (!q || name.includes(q)) ? '' : 'none';
  });
}

function toggleSelectAll(checkbox, panelId) {
  const panel = document.getElementById(panelId);
  const checked = checkbox.checked;
  panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    if (cb !== checkbox) cb.checked = checked;
  });
  onFilterChange(panelId);
}

function onFilterChange(panelId) {
  const panel = document.getElementById(panelId);
  const labels = panel.querySelectorAll('label:not(.select-all)');
  const total = labels.length;
  const checked = [...labels].filter(l => l.querySelector('input').checked).length;

  const dropdown = panel.closest('.filter-dropdown');
  const badge = dropdown.querySelector('.count-badge');
  badge.textContent = checked === total ? '전체' : `${checked}/${total}`;

  const selectAllCb = panel.querySelector('.select-all input');
  selectAllCb.checked = checked === total;

  tryBuildTab4();
}

function getSelectedFilters() {
  const getChecked = (panelId) => {
    const panel = document.getElementById(panelId);
    const labels = panel.querySelectorAll('label:not(.select-all)');
    const total = labels.length;
    const selected = [...labels].filter(l => l.querySelector('input').checked).map(l => l.querySelector('input').value);
    return selected.length === total ? null : new Set(selected);
  };
  return {
    groups: getChecked('filterPanelGroup'),
    centers: getChecked('filterPanelCenter'),
    teams: getChecked('filterPanelTeam'),
    persons: getChecked('filterPanelPerson'),
  };
}

// ══════════════════════════════════════════════
// ── Roster selection by date ──
// ══════════════════════════════════════════════
function getRosterForDate(dateStr) {
  // dateStr: 'YYYY-MM-DD' → pick roster for that month
  // Returns the roster Map for the matching month, or nearest available
  if (!dateStr) return rosterMap;
  const targetMonth = dateStr.slice(0, 7); // 'YYYY-MM'
  const months = Object.keys(rosterByMonth).sort();
  if (months.length === 0) return rosterMap;

  // Exact match
  if (rosterByMonth[targetMonth]) return rosterByMonth[targetMonth];

  // Find closest month <= target
  let best = null;
  for (const m of months) {
    if (m <= targetMonth) best = m;
  }
  return best ? rosterByMonth[best] : rosterByMonth[months[months.length - 1]];
}

// ══════════════════════════════════════════════
// ── Tab 4: Daily Performance ──
// ══════════════════════════════════════════════
async function tryBuildTab4() {
  if (!rosterMap || !contractData) return;

  const acc = await loadAccumulated();
  const allDates = Object.keys(acc.dates).sort();

  if (allDates.length === 0) {
    document.getElementById('dashboardArea').classList.add('hidden');
    document.getElementById('emptyState').classList.remove('hidden');
    document.getElementById('filterSection').classList.add('hidden');
    return;
  }

  document.getElementById('filterSection').classList.remove('hidden');
  if (document.getElementById('filterPanelGroup').children.length === 0) {
    populateFilters();
    initDefaultDates();
  }

  const { start: dateStart, end: dateEnd } = getFilterDates();
  const accDates = allDates.filter(d => {
    if (dateStart && d < dateStart) return false;
    if (dateEnd && d > dateEnd) return false;
    return true;
  });

  // 조회 종료월 기준 명단 선택
  const queryEndDate = dateEnd || (accDates.length > 0 ? accDates[accDates.length-1] : null);
  const activeRoster = getRosterForDate(queryEndDate);

  const filters = getSelectedFilters();
  const isPersonVisible = (name) => {
    if (filters.persons && !filters.persons.has(name)) return false;
    const info = activeRoster.get(name);
    if (!info) return false;
    if (filters.groups && !filters.groups.has(info.group)) return false;
    if (filters.centers && !filters.centers.has(info.center)) return false;
    if (filters.teams && !filters.teams.has(info.team)) return false;
    return true;
  };

  saveLastUpdateTime();

  const contractByKey = new Map();
  contractData.forEach(row => {
    const key = String(row[CT_COL.customerKey] || '').trim();
    if (key) contractByKey.set(key, row);
  });

  const personStats = new Map();

  function getStats(name) {
    if (!personStats.has(name)) {
      personStats.set(name, {
        todayDb: 0, todayDailyContract: 0, todayActualContract: 0,
        cumDbNonIN: 0, cumCancelNonIN: 0, cumContractNonIN: 0,
        cumDbIN: 0, cumCancelIN: 0, cumContractIN: 0,
        cumContractAll: 0, cumDbAll: 0,
        holDb: 0, holDailyContract: 0, holActualContract: 0,
      });
    }
    return personStats.get(name);
  }

  const filteredDateSet = new Set(accDates);
  const latestDate = accDates.length > 0 ? accDates[accDates.length - 1] : null;
  for (const [date, dayData] of Object.entries(acc.dates)) {
    if (!filteredDateSet.has(date)) continue;
    const isLatest = (date === latestDate);
    const isHol = dayData.isHoliday;

    for (const [name, counts] of Object.entries(dayData.persons)) {
      const s = getStats(name);
      s.cumDbNonIN += counts.nonIN;
      s.cumDbIN += counts.inOnly;
      s.cumDbAll += counts.total;
      if (isHol) s.holDb += counts.total;
      if (isLatest) s.todayDb = counts.total;
    }
  }

  lastBuildDebug = {};
  contractData.forEach(ctRow => {
    const manager = String(ctRow[CT_COL.manager] || '').trim();
    if (!manager) return;
    const custKey = String(ctRow[CT_COL.customerKey] || '').trim();
    const returnDateVal = ctRow[CT_COL.returnDate];
    const isCancelled = returnDateVal != null && returnDateVal !== '' && String(returnDateVal).trim() !== '';

    const appDateStr = datePart(ctRow[CT_COL.applicationDate]);

    const meta = acc.keyMeta[custKey];
    let isIN = false, is일계약 = false;

    if (meta) {
      isIN = meta.in === 1;
      // DB파일 기준 el=1이더라도, 계약파일의 신청일이 분배일과 다르면 이전계약
      is일계약 = meta.el === 1 && (appDateStr === meta.d);
    } else {
      const dbDateStr = datePart(ctRow[CT_COL.dbDate]);
      is일계약 = (dbDateStr && appDateStr && dbDateStr === appDateStr);
    }

    if (appDateStr) {
      if (dateStart && appDateStr < dateStart) return;
      if (dateEnd && appDateStr > dateEnd) return;
    }

    // 휴일근무: 분배일 기준 + 조회 기간 해당 월에 분배된 것만
    let isHolContract = false;
    let distDateForHol = '';
    if (meta) {
      distDateForHol = meta.d;
      const distMonth = distDateForHol ? distDateForHol.slice(0, 7) : '';
      const queryMonth = (dateEnd || appDateStr || '').slice(0, 7);
      isHolContract = isHoliday(distDateForHol) && distMonth === queryMonth;
    } else {
      distDateForHol = datePart(ctRow[CT_COL.distributeDate]) || datePart(ctRow[CT_COL.dbDate]);
      const distMonth = distDateForHol ? distDateForHol.slice(0, 7) : '';
      const queryMonth = (dateEnd || appDateStr || '').slice(0, 7);
      isHolContract = isHoliday(distDateForHol) && distMonth === queryMonth;
    }

    const s = getStats(manager);

    if (!isCancelled) {
      if (isIN) s.cumContractIN++;
      else s.cumContractNonIN++;
      s.cumContractAll++;

      if (isHolContract) {
        s.holActualContract++;
        if (is일계약) s.holDailyContract++;
        // 디버그 기록
        if (!lastBuildDebug[manager]) lastBuildDebug[manager] = { holDetails: [] };
        lastBuildDebug[manager].holDetails.push({ custKey, distDate: distDateForHol, appDate: appDateStr, type: is일계약 ? '일계약' : '이전계약', cancelled: false });
      }
      if (appDateStr === latestDate) {
        s.todayActualContract++;
        if (is일계약) s.todayDailyContract++;
      }
    } else {
      if (isIN) s.cumCancelIN++;
      else s.cumCancelNonIN++;
      // 취소 건도 휴일이면 디버그에 기록
      if (isHolContract) {
        if (!lastBuildDebug[manager]) lastBuildDebug[manager] = { holDetails: [] };
        lastBuildDebug[manager].holDetails.push({ custKey, distDate: distDateForHol, appDate: appDateStr, type: is일계약 ? '일계약' : '이전계약', cancelled: true });
      }
    }
  });

  // ── Group by activeRoster ──
  const mainGroups = ['W그룹', 'E그룹', 'N그룹', '제2외국어'];
  const talkisGroups = ['톡이즈'];
  const groupedMain = new Map();
  const groupedTalkis = new Map();
  mainGroups.forEach(g => groupedMain.set(g, []));
  talkisGroups.forEach(g => groupedTalkis.set(g, []));

  activeRoster.forEach((info, name) => {
    if (!isPersonVisible(name)) return;
    const stats = personStats.get(name) || getStats(name);
    const g = info.group;
    if (talkisGroups.includes(g)) {
      if (!groupedTalkis.has(g)) groupedTalkis.set(g, []);
      groupedTalkis.get(g).push({ name, ...info, ...stats });
    } else {
      if (!groupedMain.has(g)) groupedMain.set(g, []);
      groupedMain.get(g).push({ name, ...info, ...stats });
    }
  });

  // ── KPI (기간 전체, 모든 탭 합산) ──
  let kpiDbTotal = 0, kpiDailyContractTotal = 0, kpiActualContractTotal = 0;
  const allGrouped = [groupedMain, groupedTalkis];
  for (const gMap of allGrouped) {
    for (const [, persons] of gMap) {
      for (const p of persons) {
        kpiDbTotal += p.cumDbAll;
        kpiActualContractTotal += p.cumContractAll;
      }
    }
  }
  for (const [key, meta] of Object.entries(acc.keyMeta)) {
    if (meta.el !== 1) continue;
    if (!isPersonVisible(meta.p)) continue;
    const ctRow = contractByKey.get(key);
    if (!ctRow) continue;
    const appDate = datePart(ctRow[CT_COL.applicationDate]);
    if (appDate) {
      if (dateStart && appDate < dateStart) continue;
      if (dateEnd && appDate > dateEnd) continue;
    }
    const returnDateVal = ctRow[CT_COL.returnDate];
    const isCancelled = returnDateVal != null && returnDateVal !== '' && String(returnDateVal).trim() !== '';
    if (!isCancelled) kpiDailyContractTotal++;
  }
  document.getElementById('kpiDbCount').textContent = kpiDbTotal.toLocaleString();
  document.getElementById('kpiDailyContract').textContent = kpiDailyContractTotal.toLocaleString();
  document.getElementById('kpiActualContract').textContent = kpiActualContractTotal.toLocaleString();
  document.getElementById('kpiContractRate').textContent = kpiDbTotal > 0 ? (kpiActualContractTotal / kpiDbTotal * 100).toFixed(1) + '%' : '-';

  // ── Render helper ──
  const groupColors = {
    'W그룹': 'w-group', 'E그룹': 'e-group', 'N그룹': 'n-group',
    '제2외국어': 'lang-group', '톡이즈': 'talkis-group'
  };

  function renderGroups(groupedPersons) {
    let html = '';
    html += `<div class="info-bar">`;
    html += `<span><strong>기준일:</strong> ${todayDbDate || '(DB 미업로드)'}</span>`;
    const displayStart = accDates.length > 0 ? accDates[0] : allDates[0];
    const displayEnd = accDates.length > 0 ? accDates[accDates.length-1] : allDates[allDates.length-1];
    html += `<span><strong>조회 기간:</strong> ${displayStart} ~ ${displayEnd} (${accDates.length}일)</span>`;
    if (queryEndDate) {
      const rosterMonth = queryEndDate.slice(0, 7);
      html += `<span><strong>명단 기준:</strong> ${rosterMonth}</span>`;
    }
    html += `</div>`;

    for (const [groupName, persons] of groupedPersons) {
      if (persons.length === 0) continue;

      // 현재 순위: IN제외 실계약률 기준
      persons.sort((a, b) => {
        const ra = a.cumDbNonIN > 0 ? a.cumContractNonIN / a.cumDbNonIN : 0;
        const rb = b.cumDbNonIN > 0 ? b.cumContractNonIN / b.cumDbNonIN : 0;
        return rb - ra;
      });

      // 전일 대비 순위 계산: 당일 데이터 제외한 순위
      const prevRank = {};
      const prevSorted = [...persons].sort((a, b) => {
        const prevDbA = a.cumDbNonIN - (a.todayDb > 0 ? Math.round(a.todayDb * (a.cumDbNonIN / (a.cumDbAll || 1))) : 0);
        const prevCtA = a.cumContractNonIN - a.todayActualContract;
        const prevDbB = b.cumDbNonIN - (b.todayDb > 0 ? Math.round(b.todayDb * (b.cumDbNonIN / (b.cumDbAll || 1))) : 0);
        const prevCtB = b.cumContractNonIN - b.todayActualContract;
        const ra = prevDbA > 0 ? Math.max(0, prevCtA) / prevDbA : 0;
        const rb = prevDbB > 0 ? Math.max(0, prevCtB) / prevDbB : 0;
        return rb - ra;
      });
      prevSorted.forEach((p, i) => { prevRank[p.name] = i + 1; });

      function rankChangeHtml(currentRank, name) {
        const prev = prevRank[name];
        if (!prev) return '<span class="rank-change rank-same">-</span>';
        const diff = prev - currentRank; // positive = moved up
        if (diff > 0) return `<span class="rank-change rank-up">▲${diff}</span>`;
        if (diff < 0) return `<span class="rank-change rank-down">▼${Math.abs(diff)}</span>`;
        return '<span class="rank-change rank-same">-</span>';
      }

      const colorClass = groupColors[groupName] || 'w-group';

      html += `<div class="group-section">`;
      html += `<div class="group-header ${colorClass}">${groupName}<span class="group-count">${persons.length}명</span></div>`;
      html += `<div class="perf-table-wrap">`;
      html += `<table class="perf-table"><thead>`;
      html += `<tr class="section-header">`;
      html += `<th colspan="5"></th>`;
      html += `<th colspan="4" style="background:#e3f2fd;">당일${latestDate ? ' ('+latestDate+')' : ''}</th>`;
      html += `<th colspan="3" style="background:#e8f5e9;">누적 IN제외</th>`;
      html += `<th colspan="3" style="background:#fff8e1;">누적 IN성과</th>`;
      html += `<th colspan="2" style="background:#fce4ec;">IN포함</th>`;
      html += `<th colspan="4" style="background:#f3e5f5;">휴일근무</th>`;
      html += `<th colspan="3" style="background:#e0f2f1;">IN+휴일 제외</th>`;
      html += `<th></th>`;
      html += `</tr>`;
      html += `<tr class="sub-header">`;
      html += `<th>순위</th><th>센터</th><th>팀</th><th>이름</th><th>입사일</th>`;
      html += `<th>DB수</th><th>일계약</th><th>실계약</th><th>실계약률</th>`;
      html += `<th>DB수</th><th>취소</th><th>실계약</th>`;
      html += `<th>DB수</th><th>취소</th><th>실계약</th>`;
      html += `<th>계약수</th><th>계약률</th>`;
      html += `<th>DB수</th><th>일계약</th><th>실계약</th><th>실계약률</th>`;
      html += `<th>DB수</th><th>실계약</th><th>실계약률</th>`;
      html += `<th>전일대비</th>`;
      html += `</tr></thead><tbody>`;

      const totals = { todayDb:0, todayDailyContract:0, todayActualContract:0, cumDbNonIN:0, cumCancelNonIN:0, cumContractNonIN:0, cumDbIN:0, cumCancelIN:0, cumContractIN:0, cumContractAll:0, cumDbAll:0, holDb:0, holDailyContract:0, holActualContract:0 };

      persons.forEach((p, idx) => {
        const pureDb = p.cumDbNonIN - (p.holDb > 0 ? Math.round(p.holDb * (p.cumDbNonIN / (p.cumDbAll || 1))) : 0);
        const pureContract = p.cumContractNonIN - (p.holActualContract > 0 ? Math.round(p.holActualContract * (p.cumContractNonIN / (p.cumContractAll || 1))) : 0);
        const rank = idx + 1;

        html += `<tr>`;
        html += `<td>${rank}</td><td class="left">${p.center}</td><td class="left">${p.team}</td><td class="name-cell" style="cursor:pointer;color:#1a73e8;" onclick="showPersonDetail('${p.name.replace(/'/g, "\\'")}')">${p.name}</td><td>${p.hireDate}</td>`;
        html += `<td>${p.todayDb}</td><td>${p.todayDailyContract}</td><td>${p.todayActualContract}</td><td class="rate-cell">${fmtRate(p.todayActualContract, p.todayDb)}</td>`;
        html += `<td>${p.cumDbNonIN}</td><td>${p.cumCancelNonIN}</td><td class="highlight">${p.cumContractNonIN}</td>`;
        html += `<td>${p.cumDbIN}</td><td>${p.cumCancelIN}</td><td>${p.cumContractIN}</td>`;
        html += `<td>${p.cumContractAll}</td><td class="rate-cell">${fmtRate(p.cumContractAll, p.cumDbAll)}</td>`;
        html += `<td>${p.holDb}</td><td>${p.holDailyContract}</td><td>${p.holActualContract}</td><td class="rate-cell">${fmtRate(p.holActualContract, p.holDb)}</td>`;
        html += `<td>${Math.max(0, pureDb)}</td><td>${Math.max(0, pureContract)}</td><td class="rate-cell">${fmtRate(Math.max(0, pureContract), Math.max(1, pureDb))}</td>`;
        html += `<td>${rankChangeHtml(rank, p.name)}</td>`;
        html += `</tr>`;

        for (const k of Object.keys(totals)) totals[k] += p[k] || 0;
      });

      const tPureDb = totals.cumDbNonIN - (totals.holDb > 0 ? Math.round(totals.holDb * (totals.cumDbNonIN / (totals.cumDbAll || 1))) : 0);
      const tPureContract = totals.cumContractNonIN - (totals.holActualContract > 0 ? Math.round(totals.holActualContract * (totals.cumContractNonIN / (totals.cumContractAll || 1))) : 0);

      html += `<tr class="total-row">`;
      html += `<td colspan="5" style="text-align:right;">합계</td>`;
      html += `<td>${totals.todayDb}</td><td>${totals.todayDailyContract}</td><td>${totals.todayActualContract}</td><td class="rate-cell">${fmtRate(totals.todayActualContract, totals.todayDb)}</td>`;
      html += `<td>${totals.cumDbNonIN}</td><td>${totals.cumCancelNonIN}</td><td class="highlight">${totals.cumContractNonIN}</td>`;
      html += `<td>${totals.cumDbIN}</td><td>${totals.cumCancelIN}</td><td>${totals.cumContractIN}</td>`;
      html += `<td>${totals.cumContractAll}</td><td class="rate-cell">${fmtRate(totals.cumContractAll, totals.cumDbAll)}</td>`;
      html += `<td>${totals.holDb}</td><td>${totals.holDailyContract}</td><td>${totals.holActualContract}</td><td class="rate-cell">${fmtRate(totals.holActualContract, totals.holDb)}</td>`;
      html += `<td>${Math.max(0, tPureDb)}</td><td>${Math.max(0, tPureContract)}</td><td class="rate-cell">${fmtRate(Math.max(0, tPureContract), Math.max(1, tPureDb))}</td>`;
      html += `<td></td>`;
      html += `</tr>`;

      html += `</tbody></table></div></div>`;
    }
    return html;
  }

  document.getElementById('tabMain').innerHTML = renderGroups(groupedMain);
  document.getElementById('tabTalkis').innerHTML = renderGroups(groupedTalkis);
  document.getElementById('dashboardArea').classList.remove('hidden');
  document.getElementById('emptyState').classList.add('hidden');
}

// ══════════════════════════════════════════════
// ── Person Detail (Debug) ──
// ══════════════════════════════════════════════
function showPersonDetail(name) {
  const debug = lastBuildDebug[name];
  let html = `<h3>${name} — 휴일근무 상세</h3>`;
  if (!debug || debug.holDetails.length === 0) {
    html += '<p style="color:#888;">휴일근무 계약 내역이 없습니다.</p>';
  } else {
    const details = debug.holDetails;
    const active = details.filter(d => !d.cancelled);
    const cancelled = details.filter(d => d.cancelled);
    html += `<p style="font-size:13px;margin-bottom:8px;">휴일 계약: <strong>${active.length}건</strong> (일계약 ${active.filter(d=>d.type==='일계약').length} / 이전계약 ${active.filter(d=>d.type==='이전계약').length})`;
    if (cancelled.length > 0) html += ` + 취소 ${cancelled.length}건`;
    html += `</p>`;
    html += '<table><thead><tr><th>고객키</th><th>분배일</th><th>오더일</th><th>유형</th><th>상태</th></tr></thead><tbody>';
    details.forEach(d => {
      const cls = d.cancelled ? ' class="cancelled"' : '';
      html += `<tr${cls}><td style="font-size:10px;">${d.custKey}</td><td>${d.distDate}</td><td>${d.appDate}</td><td>${d.type}</td><td>${d.cancelled ? '취소' : '유효'}</td></tr>`;
    });
    html += '</tbody></table>';
  }
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('active');
}

// ══════════════════════════════════════════════
// ── Downloads ──
// ══════════════════════════════════════════════
function getActiveTabPanel() {
  const active = document.querySelector('.tab-panel.active');
  return active;
}

function getActiveTabName() {
  const btn = document.querySelector('.tab-btn.active');
  return btn ? btn.textContent.trim() : 'dashboard';
}

function downloadPng() {
  const panel = getActiveTabPanel();
  if (!panel || !panel.innerHTML) return;
  html2canvas(panel, { scale: 2, backgroundColor: '#f0f2f5' }).then(canvas => {
    const link = document.createElement('a');
    link.download = `${getActiveTabName()}_성과_${new Date().toISOString().slice(0,10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

function downloadHtml() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const link = document.createElement('a');
  link.download = `WM_데일리성과_${new Date().toISOString().slice(0,10)}.html`;
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

function downloadExcel() {
  const panel = getActiveTabPanel();
  if (!panel) return;
  const tables = panel.querySelectorAll('.perf-table');
  const headers = panel.querySelectorAll('.group-header');
  if (tables.length === 0) return;
  const wb = XLSX.utils.book_new();
  const rows = [];
  tables.forEach((table, i) => {
    const groupName = headers[i] ? headers[i].textContent.replace(/\d+명$/, '').trim() : '';
    if (i > 0) rows.push([]);
    rows.push([groupName]);
    const trs = table.querySelectorAll('tr');
    trs.forEach(tr => {
      const row = [];
      tr.querySelectorAll('th, td').forEach(cell => {
        const colspan = parseInt(cell.getAttribute('colspan')) || 1;
        const val = cell.textContent.trim();
        const num = val.replace(/,/g, '');
        row.push(isNaN(num) || val === '' || val === '-' ? val : Number(num));
        for (let c = 1; c < colspan; c++) row.push('');
      });
      rows.push(row);
    });
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, getActiveTabName().slice(0, 31));
  XLSX.writeFile(wb, `${getActiveTabName()}_성과_${new Date().toISOString().slice(0,10)}.xlsx`);
}

refreshStorageDisplay().catch(() => {});
updateLastUpdateTime();
loadSavedFiles().catch(() => {});
